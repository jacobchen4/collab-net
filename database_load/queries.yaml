cypher:

# Read Queries
  get_all_authors: |
    MATCH (a:author)
    RETURN a

  get_all_publications: |
    MATCH (p:publication)
    RETURN p

  get_authors_for_publication: |
    MATCH (p:publication {pub_key: $pub_key})-[:AUTHORED]-(a:author)
    RETURN a
  
  get_publications_for_author: |
    MATCH (a: author {author: $author})-[:AUTHORED]-(p:publication)
    RETURN p

  get_authors_by_conference: |
    match (a:author)-[e:AUTHORED]-(b:publication)
    where b.pub_key contains $conf
    return distinct a.author as authors

  get_publications_by_conference: |
    match (b:publication)
    where b.pub_key contains $conf
    return b as publications

  get_authors_by_year: |
    match (a:author)--(b:publication {year: $year})
    return distinct a.author as authors

  get_publications_by_year: |
    match (b:publication {year: $year})
    return b as publications

  get_authors_by_conference_and_year: |
    match (a:author)--(b:publication {year: $year})
    where b.pub_key contains $conf
    return distinct a.author as authors

  get_publications_by_conference_and_year: |
    match (b:publication {year: $year})
    where b.pub_key contains $conf
    return b as publications

  get_graph_for_year: |
    match(a:author)-[d:COAUTHORED_WITH]-(b:author)
    where a in collect {
    match (a:author)-[c:AUTHORED]-(p:publication)
    where p.year = $year
    return a
    }
    return a.author as authors, d.pub_key as edges, b.author as coauthors

  get_graph_for_conference: |
    match(a:author)-[d:COAUTHORED_WITH]-(b:author)
    where a in collect {
    match (a:author)-[c:AUTHORED]-(p:publication)
    where p.pub_key contains $conf
    return a
    }
    return a.author as authors, d.pub_key as edges, b.author as coauthors

  get_graph_for_conference_and_year: |
    match(a:author)-[d:COAUTHORED_WITH]-(b:author)
    where a in collect {
    match (a:author)-[c:AUTHORED]-(p:publication)
    where p.year = $year and p.pub_key contains $conf
    return a
    }
    return a.author as authors, d.pub_key as edges, b.author as coauthors

# Write Queries
  add_coauthorship_edge: |
    MATCH (a:author {author: $author}), (b:author {author: $coauthor})
    MERGE (a)-[c:COAUTHORED_WITH {pub_key: $pub_key}]-(b)
    return c

  add_coauthorship_edges_batch: |
    UNWIND $author_pairs as pair
    OPTIONAL MATCH (a:author {author: pair.author}), (b:author {author: pair.coauthor})
    WHERE a IS NOT NULL AND b IS NOT NULL AND a <> b
    WITH a, b, pair
    MERGE (a)-[c:COAUTHORED_WITH {pub_key: $pub_key}]-(b)
    RETURN COUNT(c) as edges_created