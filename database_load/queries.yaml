cypher:

# Read Queries
  get_all_authors: |
    MATCH (a:author)
    RETURN a

  get_all_publications: |
    MATCH (p:publication)
    RETURN p

  get_authors_for_publication: |
    MATCH (p:publication {pub_key: $pub_key})-[:AUTHORED]-(a:author)
    RETURN a
  
  get_publications_for_author: |
    MATCH (a: author {author: $author})-[:AUTHORED]-(p:publication)
    RETURN p
  
  get_coauthors_for_author_batch: |
    UNWIND $authors as author
    MATCH (a:author {author: a.author})-[c:COAUTHORED_WITH]-(b:author)
    RETURN b as coauthors

  get_author-publication_degree_centrality: |
    MATCH (a:author)-[e:AUTHORED]-(:publication)
    with a.author as author, count(e) as num_publications
    $min_degree
    RETURN author, num_publications
    ORDER BY num_publications DESC
    $limit

  get_graph_state_by_year: |
    MATCH (a:author)-[c:COAUTHORED_WITH]


# Write Queries
  add_coauthorship_edge: |
    MATCH (a:author {author: $author}), (b:author {author: $coauthor})
    MERGE (a)-[c:COAUTHORED_WITH {pub_key: $pub_key}]-(b)
    return c

  add_coauthorship_edges_batch: |
    UNWIND $author_pairs as pair
    OPTIONAL MATCH (a:author {author: pair.author}), (b:author {author: pair.coauthor})
    WHERE a IS NOT NULL AND b IS NOT NULL AND a <> b
    WITH a, b, pair
    MERGE (a)-[c:COAUTHORED_WITH {pub_key: $pub_key}]-(b)
    RETURN COUNT(c) as edges_created